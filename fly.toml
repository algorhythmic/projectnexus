# fly.toml app configuration file generated for projectnexus on 2026-03-11T15:27:13-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'projectnexus'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  build-target = 'production'

# Secrets (not here — use fly secrets set):
#   POSTGRES_DSN="postgresql://...?sslmode=require"  (always require SSL for Supabase)
#   KALSHI_API_KEY, KALSHI_PRIVATE_KEY_PEM, CONVEX_DEPLOY_KEY, ANTHROPIC_API_KEY

[env]
  CROSS_PLATFORM_ENABLED = 'true'
  DETECTION_STARTUP_DELAY_SECONDS = '120'
  DISCOVERY_INTERVAL_SECONDS = '60'
  KALSHI_USE_DEMO = 'false'
  LOG_LEVEL = 'INFO'
  POLYMARKET_ENABLED = 'false'
  RETENTION_DAYS = '90'
  STORE_BACKEND = 'postgres'

[processes]
  worker = 'python -m nexus.cli run --platform all'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  processes = ['worker']
